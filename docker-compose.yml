services:
  shake-mqtt-bridge:
    build: .
    restart: unless-stopped
    ports:
      - "${SHAKE_UDP_PORT:-8888}:${SHAKE_UDP_PORT:-8888}/udp"
    environment:
      SHAKE_UDP_BIND_HOST: ${SHAKE_UDP_BIND_HOST:-0.0.0.0}
      SHAKE_UDP_PORT: ${SHAKE_UDP_PORT:-8888}
      SHAKE_UDP_RECV_BUFSIZE: ${SHAKE_UDP_RECV_BUFSIZE:-2048}
      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST:-mqtt}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-1883}
      MQTT_TOPIC: ${MQTT_TOPIC:-home/seismic/shake}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-shake-bridge}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_TLS: ${MQTT_TLS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SHAKE_JSON_STRUCTURED: ${SHAKE_JSON_STRUCTURED:-false}
      SHAKE_DETECT_EVENTS: ${SHAKE_DETECT_EVENTS:-false}
      SHAKE_DETECT_STA_SEC: ${SHAKE_DETECT_STA_SEC:-1}
      SHAKE_DETECT_LTA_SEC: ${SHAKE_DETECT_LTA_SEC:-30}
      SHAKE_DETECT_RATIO_ON: ${SHAKE_DETECT_RATIO_ON:-4}
      SHAKE_DETECT_RATIO_OFF: ${SHAKE_DETECT_RATIO_OFF:-2}
      SHAKE_DETECT_COOLDOWN_SEC: ${SHAKE_DETECT_COOLDOWN_SEC:-5}
      SHAKE_DETECT_DEFAULT_FS_HZ: ${SHAKE_DETECT_DEFAULT_FS_HZ:-100}
      SHAKE_DETECT_CHANNELS: ${SHAKE_DETECT_CHANNELS:-}
      SHAKE_DETECT_STARTUP_GRACE_SEC: ${SHAKE_DETECT_STARTUP_GRACE_SEC:-5}
      SHAKE_CATALOG_ENABLE: ${SHAKE_CATALOG_ENABLE:-false}
      SHAKE_CATALOG_LATITUDE: ${SHAKE_CATALOG_LATITUDE:-}
      SHAKE_CATALOG_LONGITUDE: ${SHAKE_CATALOG_LONGITUDE:-}
      SHAKE_CATALOG_MAX_RADIUS_KM: ${SHAKE_CATALOG_MAX_RADIUS_KM:-500}
      SHAKE_CATALOG_TIME_BEFORE_SEC: ${SHAKE_CATALOG_TIME_BEFORE_SEC:-120}
      SHAKE_CATALOG_TIME_AFTER_SEC: ${SHAKE_CATALOG_TIME_AFTER_SEC:-60}
      SHAKE_CATALOG_DELAY_SEC: ${SHAKE_CATALOG_DELAY_SEC:-0}
      SHAKE_CATALOG_USE_TRAVELTIME: ${SHAKE_CATALOG_USE_TRAVELTIME:-true}
      SHAKE_CATALOG_TRAVELTIME_MODEL: ${SHAKE_CATALOG_TRAVELTIME_MODEL:-iasp91}
      SHAKE_CATALOG_TRAVELTIME_TIMEOUT_SEC: ${SHAKE_CATALOG_TRAVELTIME_TIMEOUT_SEC:-6}
      SHAKE_CATALOG_TRAVELTIME_MAX_WORKERS: ${SHAKE_CATALOG_TRAVELTIME_MAX_WORKERS:-6}
